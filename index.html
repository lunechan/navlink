<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lune Ads</title>

        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }

            body {
                background-size: cover;
                background-repeat: no-repeat;
                background-color: white;
            }

            .wholepage {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                text-indent: -9999px;
            }

            .fixed {
                position: fixed;
                bottom: -2px;
                left: 0;
                padding: 1px;
                padding-left: 2px;
                padding-bottom: 0.5px;
                border: 1px solid gray;
                border-top-right-radius: 4px;
                background-color: rgba(255, 255, 255, 0.75);
                font-size: 11px;
                font-family: "MS Gothic", sans-serif;
            }

            .fixed a {
                color: dimgray;
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <a href="#" target="_blank" class="wholepage" id="imglink"></a>

        <div class="fixed">
            <a href="https://malune.net" target="_blank">Lune Ads</a>
        </div>

        <script>
            // Passed through many hands (user2663434, melodicake, Dokodemo, dimden).
            // Now at malune.net, slightly modified and maintained. Thanks to everyone before me.

            var sites = [
                {
                    url: "malune.net",
                    image: "malune.gif",
                },
                {
                    url: "aaeri.neocities.org",
                    image: "aaeri.gif",
                },
                {
                    url: "phantasmagorya.neocities.org",
                    image: "phantasmagorya.gif"
                },
                {
                    url: "sargx.net",
                    image: "sargx.gif",
                },
                {
                    url: "dudalog.neocities.org",
                    image: "dudalog.gif",
                },
                {
                    url: "marinados.neocities.org",
                    image: "marinados.gif",
                },
                {
                    url: "tevito.neocities.org",
                    image: "tevito.gif",
                },
            ];

            var body = document.body;
            var link = document.getElementById("imglink");
            var currentIndex = Math.floor(Math.random() * sites.length);

            function changeAd() {
                body.style.backgroundImage = "url('./assets/" + sites[currentIndex].image + "')";
                link.href = "https://" + sites[currentIndex].url;
                currentIndex = (currentIndex + 1) % sites.length;
            }
            changeAd();
            setInterval(changeAd, 10000);
        </script>
    </body>
</html>
